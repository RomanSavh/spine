services:
  spine:
    build: .
    ports:
      - "3000:3000"
    environment:
      SPINE_PORT: "3000"
      SPINE_DB_PATH: /data/spine.db
      SPINE_EMBED_URL: http://spine-embed:8000
    volumes:
      - spine-data:/data
    depends_on:
      spine-embed:
        condition: service_healthy

  spine-embed:
    build: ./embed-service
    environment:
      HF_HOME: /root/.cache/huggingface
    volumes:
      - embed-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  spine-data:
  embed-cache:
